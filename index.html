<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEQ - 東京科学大学クイズ研究会</title>
    <link rel="icon" href="img/TEQLogo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .nav-card {
            display: block;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .nav-card:hover {
            box-shadow: 0 4px 12px rgba(28, 49, 119, 0.15);
            transform: translateY(-2px);
        }

        .nav-card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1C3177;
            margin-bottom: 0.5rem;
        }

        .nav-card-desc {
            font-size: 0.9rem;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>東京科学大学クイズ研究会</h1>
        <p>正解への情熱、知の探究。</p>
    </header>

    <main>
        <section>
            <h2>メニュー</h2>
            <div class="nav-grid">
                <a href="join.html" class="nav-card">
                    <div class="nav-card-title">入会案内</div>
                    <div class="nav-card-desc">活動への参加方法や、入会条件・年会費についてご案内します。</div>
                </a>
                <a href="schedule.html" class="nav-card">
                    <div class="nav-card-title">活動紹介</div>
                    <div class="nav-card-desc">活動内容・場所・年間スケジュールをまとめています。</div>
                </a>
                <a href="blog.html" class="nav-card">
                    <div class="nav-card-title">ブログ</div>
                    <div class="nav-card-desc">大会レポートや練習の様子など、活動の記録を掲載しています。</div>
                </a>
                <a href="booth.html" class="nav-card">
                    <div class="nav-card-title">問題集</div>
                    <div class="nav-card-desc">TEQが制作した問題集をBoothにて販売しています。</div>
                </a>
                <a href="contact.html" class="nav-card">
                    <div class="nav-card-title">連絡先</div>
                    <div class="nav-card-desc">XアカウントやメールアドレスなどのSNS・連絡先はこちら。</div>
                </a>
                <a href="history.html" class="nav-card">
                    <div class="nav-card-title">TEQの歴史</div>
                    <div class="nav-card-desc">サークルの成り立ちや「TEQ」という名前の由来について。</div>
                </a>
            </div>
        </section>

        <section class="quiz-box">
            <h2>今日の1問</h2>
            <p id="quiz-question"><strong>Q.</strong> <span id="question-text">読み込み中...</span></p>
            <details>
                <summary style="cursor: pointer; color: #1C3177; font-weight: bold;">正解を見る</summary>
                <p id="answer-text" style="margin-top: 10px;"></p>
            </details>
        </section>
    </main>

    <script src="js/quiz.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/footer.js"></script>

</body>
</html>
