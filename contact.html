<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連絡先 - TEQ 東京科学大学クイズ研究会</title>
    <link rel="icon" href="teq3-01.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Contact</h1>
        <p>お問い合わせ・SNSアカウント</p>
    </header>

    <main>

        <div class="contact-list">

            <div class="contact-card">
                <a href="https://twitter.com/TEQweb" target="_blank" class="card-link-header">
                    <img src="x-logo.png" alt="X Icon" class="icon-img">
                    <span>@TEQweb</span>
                </a>
                <p class="card-desc">
                    日々の活動の様子や、例会の告知などを発信しています。クイズ大会の参加報告などもこちらで行っています。
                </p>
            </div>

            <div class="contact-card">
                <a href="https://twitter.com/teqwelcome" target="_blank" class="card-link-header">
                    <img src="x-logo.png" alt="X Icon" class="icon-img">
                    <span>@teqwelcome</span>
                </a>
                <p class="card-desc">
                    新入生・見学者向けの情報を発信しています。体験参加の希望や、質問などのDMも大歓迎です！
                </p>
            </div>

            <div class="contact-card">
                <a href="mailto:teqquiz@gmail.com" class="card-link-header">
                    <img src="mail-logo.png" alt="Mail Icon" class="icon-img">
                    <span>teqquiz@gmail.com</span>
                </a>
                <p class="card-desc">
                    他大学様との交流戦のご依頼や、企業様からのお問い合わせはこちらまでお願いいたします。
                    （返信には数日いただく場合がございます）
                </p>
            </div>

        </div>

        <section style="text-align: center; margin-top: 60px; margin-bottom: 50px;">
            <a href="index.html" class="btn">ホームに戻る</a>
        </section>

    </main>

    <script src="menu.js"></script>
    <script src="footer.js"></script>

</body>
</html>
